<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Tracker</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f7f7f7;
        }

        nav {
            margin-bottom: 20px;
        }

        nav a {
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
            margin-right: 15px;
        }

        nav a:hover {
            text-decoration: underline;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background-color: #f0f0f0;
        }

        tr:hover {
            background-color: #f9f9f9;
        }

        .actions a {
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 14px;
        }

        .actions a:first-child {
            background: #007bff;
            color: white;
        }

        .actions a:last-child {
            background: #dc3545;
            color: white;
        }

        .actions a:hover {
            opacity: 0.85;
        }

        /* Status colors */
        .status.applied {
            color: #007bff;
            font-weight: bold;
        }

        .status.interviewing {
            color: #ff9800;
            font-weight: bold;
        }

        .status.offer {
            color: #28a745;
            font-weight: bold;
        }

        .status.rejected {
            color: #dc3545;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <nav>
        <a href="{{ url_for('main.dashboard') }}">Dashboard</a>
        <a href="{{ url_for('main.add_job') }}">Add Job</a>
    </nav>

    <hr>

    {% block content %}
    {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>
</html>
