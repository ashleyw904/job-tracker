{% extends "base.html" %}

{% block content %}

<h1>Job Details</h1>

<div style="background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); max-width: 600px;">

    <p><strong>Company:</strong> {{ job.company }}</p>
    <p><strong>Position:</strong> {{ job.position }}</p>
    <p><strong>Status:</strong> {{ job.status }}</p>
    <p><strong>Date Applied:</strong> {{ job.date_applied.strftime("%b %d, %Y") }}</p>

    <p><strong>Notes:</strong></p>
    <div style="white-space: pre-wrap; background: #f7f7f7; padding: 10px; border-radius: 6px;">
        {{ job.notes }}
    </div>

    <div style="margin-top: 20px;">
        <a href="{{ url_for('main.edit_job', job_id=job.id) }}">Edit</a> |
        <a href="{{ url_for('main.delete_job', job_id=job.id) }}">Delete</a> |
        <a href="{{ url_for('main.dashboard') }}">Back to Dashboard</a>
    </div>

</div>

{% endblock %}
